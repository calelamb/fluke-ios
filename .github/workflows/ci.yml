name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: 26.0.1
  FLUKE_SIMULATOR_NAME: iPhone 17
  FLUKE_SIMULATOR_RUNTIME_IDENTIFIER: com.apple.CoreSimulator.SimRuntime.iOS-26-0

jobs:
  release-a-verification:
    name: Release A iOS verification
    runs-on: macos-15
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Pin Xcode and simulator runtime
        run: |
          set -euo pipefail
          sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer"
          test "$(xcodebuild -version | sed -n '1p')" = "Xcode ${XCODE_VERSION}"
          xcrun simctl list runtimes available | grep -F 'iOS 26.0 (26.0.1'
          xcrun simctl list devices available | grep -F 'iPhone 17 ('
          scripts/prepare-ios-simulator.sh

      - name: Prepare verification artifacts
        run: mkdir -p build/verification/package-coverage build/verification/snapshot-artifacts

      - name: Test verification scripts
        run: scripts/tests/verification-scripts-tests.sh

      - name: Verify packaged canonical API fixtures
        run: scripts/verify-contract-fixtures.sh --no-upstream

      - name: Run all Swift package tests with coverage
        env:
          SNAPSHOT_ARTIFACTS: ${{ github.workspace }}/build/verification/snapshot-artifacts
        run: |
          set -euo pipefail
          for package in FlukeKit FlukeUI FlukeFeatures; do
            swift test --package-path "Packages/${package}" --enable-code-coverage
            coverage_path="$(swift test --package-path "Packages/${package}" --show-codecov-path | tail -1)"
            test -s "$coverage_path"
            cp "$coverage_path" "build/verification/package-coverage/${package}.json"
          done

      - name: Enforce FlukeKit source line coverage
        run: >-
          scripts/verify-swift-package-coverage.sh
          build/verification/package-coverage/FlukeKit.json
          /Sources/FlukeKit/
          80

      - name: Run meaningful app tests with coverage
        timeout-minutes: 10
        env:
          FLUKE_RESULT_BUNDLE_PATH: build/verification/AppTests.xcresult
          FLUKE_ENABLE_COVERAGE: YES
        run: scripts/verify-release-a-boundaries.sh

      - name: Collect simulator diagnostics
        if: always()
        continue-on-error: true
        timeout-minutes: 3
        run: >-
          xcrun simctl diagnose -b --timeout=120
          --output=build/verification/simulator-diagnostics
          --udid="$SIMULATOR_UDID"

      - name: Enforce app line coverage
        run: |
          set -euo pipefail
          xcrun xccov view --report --json build/verification/AppTests.xcresult \
            >build/verification/app-coverage.json
          scripts/verify-coverage.sh build/verification/app-coverage.json Fluke.app 80

      - name: Build Debug and Release for the pinned simulator
        run: |
          set -euo pipefail
          for configuration in Debug Release; do
            xcodebuild build -quiet \
              -workspace Fluke.xcworkspace \
              -scheme Fluke \
              -configuration "$configuration" \
              -destination "$SIMULATOR_DESTINATION" \
              CODE_SIGNING_ALLOWED=NO
          done

      - name: Create and validate unsigned generic archive
        run: |
          set -euo pipefail
          xcodebuild archive -quiet \
            -workspace Fluke.xcworkspace \
            -scheme Fluke \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/verification/Fluke.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
          scripts/verify-archive-metadata.sh \
            build/verification/Fluke.xcarchive app.fluke.Fluke 17.0
          plutil -convert xml1 -o build/verification/archive-metadata.plist \
            build/verification/Fluke.xcarchive/Info.plist

      - name: Upload test and coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-a-ios-verification-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/verification/AppTests.xcresult
            build/verification/app-coverage.json
            build/verification/package-coverage
            build/verification/snapshot-artifacts
            build/verification/archive-metadata.plist
            build/verification/simulator-diagnostics
