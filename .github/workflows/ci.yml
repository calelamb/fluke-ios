name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-tests:
    name: Swift package tests
    runs-on: macos-15
    strategy:
      matrix:
        package: [FlukeKit, FlukeUI, FlukeFeatures]
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Run tests for ${{ matrix.package }}
        working-directory: Packages/${{ matrix.package }}
        run: swift test --enable-code-coverage

  app-tests:
    name: Xcode app tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: List available simulators
        run: xcrun simctl list devices available | head -30
      - name: Build + test
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace Fluke.xcworkspace \
            -scheme Fluke \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath build/TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify || (
              echo "::error::Tests failed; xcresult at build/TestResults.xcresult"
              exit 1
            )
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/TestResults.xcresult
